name: Update Proxies List

on:
  schedule:
    - cron: '0 */3 * * *'   # هر ۳ ساعت یک‌بار
  workflow_dispatch:        # بشه دستی هم اجراش کرد

jobs:
  update-proxies:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # اجازه‌ی push کردن

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch proxies from Shadowmere API
        run: |
          curl -s -H "Accept: application/json" \
               -H "User-Agent: GitHub-Action" \
               "https://shadowmere.xyz/api/proxies/?format=json" | \
          jq -r '.results[].url' > proxies.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proxies.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-update proxies list"
            git push
          fi
