<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shadowmere GitHub Bridge</title>
</head>
<body>
<pre id="out">loading…</pre>

<script>
(async () => {
  try {
    const res = await fetch("https://shadowmere.xyz/api/proxies/?format=json", {
      headers: {
        "User-Agent": navigator.userAgent,
        "Accept": "application/json",
        "Referer": "https://shadowmere.xyz/"
      }
    });

    if (!res.ok) {
      document.getElementById("out").textContent = "Fetch error: " + res.status;
      return;
    }

    const data = await res.json();
    // خروجی فقط آدرس‌ها، هر کدام در یک خط
    const urls = data.results.map(item => item.url).join("\n");
    document.getElementById("out").textContent = urls;

  } catch (e) {
    document.getElementById("out").textContent = "Error: " + e.message;
  }
})();
</script>
</body>
</html>
